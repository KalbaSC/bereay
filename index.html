<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل مبادرة خلك جاهز</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@font-face {
  font-family: 'NotoKufiArabic';
  src: url('NotoKufiArabic.ttf') format('truetype');
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
  background: #000;
}

body {
  font-family: 'NotoKufiArabic', Arial, sans-serif;
  color: #fff;
  background:
    linear-gradient(90deg, rgba(0,0,0,.45), rgba(0,0,0,.25), rgba(0,0,0,.45)),
    linear-gradient(rgba(0,0,0,.15), rgba(0,0,0,.55)),
    url('./fitness_bg.png.png') center/cover fixed no-repeat;
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  min-height: 84px;
  padding: 12px 28px;
  background: rgba(0,0,0,.88);
  border-bottom: 2px solid #ffd400;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}

.logos {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  height: 54px;
  object-fit: contain;
}

.divider {
  width: 1px;
  height: 48px;
  background: rgba(255,255,255,.7);
}

.club-title {
  text-align: left;
}

.club-title h3 {
  margin: 0;
  font-size: 21px;
  font-weight: 900;
}

.club-title p {
  margin: 4px 0 0;
  color: #ffd400;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: .8px;
}

main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px 16px;
}

.container {
  width: 100%;
  max-width: 560px;
  background: rgba(6, 6, 6, .82);
  border: 1px solid rgba(255, 212, 0, .45);
  border-radius: 18px;
  padding: 26px;
  box-shadow:
    0 24px 80px rgba(0,0,0,.9),
    0 0 24px rgba(255,212,0,.12);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.form-title {
  text-align: center;
  margin-bottom: 8px;
}

.form-title .small {
  display: block;
  color: #ddd;
  font-size: 19px;
  font-weight: 800;
}

.form-title .main {
  display: block;
  color: #ffd400;
  font-size: 38px;
  font-weight: 900;
  margin-top: 4px;
}

.subtitle {
  text-align: center;
  color: #bbb;
  font-size: 14px;
  margin-bottom: 18px;
}

.line {
  width: 150px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ffd400, transparent);
  margin: 0 auto 22px;
}

label {
  display: block;
  margin-top: 15px;
  color: #f5f5f5;
  font-size: 14px;
  font-weight: 800;
}

input {
  width: 100%;
  height: 48px;
  margin-top: 7px;
  padding: 0 15px;
  border-radius: 11px;
  border: 1px solid rgba(255,255,255,.22);
  background: rgba(0,0,0,.72);
  color: #fff;
  font-size: 15px;
  outline: none;
}

input:focus {
  border-color: #ffd400;
  box-shadow: 0 0 0 3px rgba(255,212,0,.14);
}

input::placeholder {
  color: #777;
}

.checkbox-box {
  margin-top: 18px;
  padding: 14px;
  background: rgba(0,0,0,.58);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 12px;
}

.checkbox-box label {
  margin: 0;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  line-height: 1.9;
  color: #e8e8e8;
  font-size: 13px;
  font-weight: 600;
}

.checkbox-box input {
  width: 20px;
  height: 20px;
  margin-top: 5px;
  flex: 0 0 auto;
  accent-color: #ffd400;
}

button {
  width: 100%;
  height: 52px;
  margin-top: 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #ffd400, #ffc400);
  color: #000;
  font-size: 21px;
  font-weight: 900;
  cursor: pointer;
}

button:hover {
  filter: brightness(1.08);
}

button:disabled {
  opacity: .65;
  cursor: not-allowed;
}

#statusMessage {
  display: none;
  margin-top: 15px;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: rgba(0,0,0,.65);
  border: 1px solid rgba(255,212,0,.35);
  color: #ffd400;
  font-size: 14px;
  font-weight: 800;
}

footer {
  padding: 12px;
  background: rgba(0,0,0,.88);
  border-top: 2px solid #ffd400;
  color: #ccc;
  text-align: center;
  font-size: 12px;
}

@media (max-width: 600px) {

  body {
    background:
     linear-gradient(
rgba(0,0,0,.05),
rgba(0,0,0,.20)
),
      url('./fitness_bg.png.png?v=4') 35% center / cover no-repeat !important;
    background-color: #000 !important;
    background-attachment: scroll !important;
  }

 .container{
    width:88%;
    max-width:420px;
    padding:18px;
    border-radius:18px;
    margin:35px auto;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}

  header {
    min-height: 78px;
    padding: 10px 14px;
    justify-content: center;
  }

  .logo {
    height: 45px;
  }

  .divider {
    height: 42px;
  }

  .club-title {
    display: none;
  }

  main {
    align-items: flex-start;
    padding: 18px 12px 28px;
  }

  .container {
    max-width: 100%;
    padding: 20px;
    border-radius: 16px;
  }

  .form-title .small {
    font-size: 17px;
  }

  .form-title .main {
    font-size: 32px;
  }

  .subtitle {
    font-size: 13px;
    margin-bottom: 14px;
  }

  label {
    font-size: 13px;
    margin-top: 13px;
  }

  input {
    height: 45px;
    font-size: 14px;
  }

  .checkbox-box {
    padding: 12px;
  }

  .checkbox-box label {
    font-size: 12px;
    line-height: 1.8;
  }

  button {
    height: 48px;
    font-size: 19px;
  }
}
</style>
</head>

<body>
<div class="page">

<header>
  <div class="logos">
    <img src="Picture3.png" class="logo" alt="شعار مجلس الشارقة الرياضي">
    <div class="divider"></div>
    <img src="logo.png" class="logo" alt="شعار نادي كلباء">
  </div>

  <div class="club-title">
    <h3>نادي كلباء الرياضي الثقافي</h3>
    <p>KALBA SPORTS & CULTURAL CLUB</p>
  </div>
</header>

<main>
  <div class="container">
    <div class="form-title">
      <span class="small">التسجيل في مبادرة</span>
      <span class="main">خلك جاهز</span>
    </div>

    <div class="subtitle">يرجى تعبئة البيانات بدقة لإكمال التسجيل</div>
    <div class="line"></div>

    <form id="fitnessForm">
      <label>
        الاسم الكامل 
        <input type="text" id="name" required placeholder="الاسم الثلاثي" autocomplete="off">
      </label>

      <label>
        العمر
        <input type="number" id="age" required min="15" max="60" placeholder="العمر" autocomplete="off">
      </label>

      <label>
        رقم الهوية الإماراتية
        <input type="text" id="emiratesId" required maxlength="15" placeholder="784xxxxxxxxxxxx" autocomplete="off" inputmode="numeric">
      </label>

      <div class="checkbox-box">
        <label>
          <input type="checkbox" id="fitnessCommitment" required>
          <span>
            أتعهد بأنني أتمتع باللياقة البدنية اللازمة للمشاركة في المبادرة،
            وأتحمل المسؤولية عن صحة البيانات المدخلة، وأوافق على الالتزام
            بجميع تعليمات وأنظمة المبادرة.
          </span>
        </label>
      </div>

      <button type="submit" id="submitBtn">تسجيل</button>
    </form>

    <div id="statusMessage"></div>
  </div>
</main>

<footer>
  © 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة
</footer>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0jkfUWN5uy_ayR47QpE0VhqW_K9yoL7Jt9MHMUBgwJX7_Tm4WWfOfbsvCFKCnXa_p/exec";

document.getElementById("fitnessForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  let name = document.getElementById("name").value.trim().replace(/\s+/g, " ");
  const age = document.getElementById("age").value.trim();
  const emiratesId = document.getElementById("emiratesId").value.replace(/\D/g, "").trim();
  const commitment = document.getElementById("fitnessCommitment").checked;

  document.getElementById("name").value = name;

  const nameParts = name.split(" ");

  if (nameParts.length < 3) {
    alert("الرجاء إدخال الاسم الثلاثي على الأقل.");
    return;
  }

  const arabicNameRegex = /^[ء-ي\s]+$/;

  if (!arabicNameRegex.test(name)) {
    alert("الاسم يجب أن يكون باللغة العربية فقط وبدون أرقام أو رموز.");
    return;
  }

  if (!/^784\d{12}$/.test(emiratesId)) {
    alert("رقم الهوية غير صحيح. يجب أن يبدأ بـ 784 ويتكون من 15 رقمًا.");
    return;
  }

  if (!commitment) {
    alert("يجب الموافقة على تعهد اللياقة البدنية قبل التسجيل.");
    return;
  }

  const statusMessage = document.getElementById("statusMessage");
  const submitBtn = document.getElementById("submitBtn");

  submitBtn.disabled = true;
  submitBtn.innerText = "جاري التسجيل...";

  try {
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        name: name,
        age: age,
        emiratesId: emiratesId,
        fitnessCommitment: commitment ? "نعم" : "لا"
      })
    });

    const result = await response.text();

    statusMessage.style.display = "block";

    if (result.includes("duplicate")) {
      statusMessage.style.color = "red";
      statusMessage.innerText = "❌ هذا الرقم مسجل مسبقاً.";
    } else if (result.includes("success")) {
      statusMessage.style.color = "#ffd400";
      statusMessage.innerText = "✅ تم التسجيل بنجاح.";
      document.getElementById("fitnessForm").reset();
    } else {
      throw new Error(result);
    }

  } catch (error) {
    console.error(error);
    statusMessage.style.display = "block";
    statusMessage.style.color = "red";
    statusMessage.innerText = "❌ حدث خطأ أثناء التسجيل.";
  }

  submitBtn.disabled = false;
  submitBtn.innerText = "تسجيل";
});
</script>

</body>
</html>
